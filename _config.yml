# =============================================
#  Site Configuration
#  Edit these values to personalise your site
# =============================================

title: "Amara Hafeez"
tagline: "Writer. Wanderer. Weekly chronicler."
description: "Personal site and blog of Amara Hafeez — essays on life, books, travel and ideas published every week."
author: "Amara Hafeez"
email: "amarahafeez100@gmail.com"
baseurl: ""          # Leave empty if using username.github.io
url: "https://amarahafeez.github.io"

# Social (leave blank to hide)
twitter_username:
github_username:

# Blog settings
blog_title:      "Chronicles"
blog_description: "Weekly writing — essays, observations, and long-form reflections."
posts_per_page:  9

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /chronicles/:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 9
paginate_path: "/chronicles/page:num/"

kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
